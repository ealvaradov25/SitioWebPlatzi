
# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - platzicursoweb21

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Build with dotnet
        run: dotnet build PlatziWenSite/PlatziWenSite.csproj --configuration Release

      - name: Publish with dotnet
        run: dotnet publish PlatziWenSite/PlatziWenSite.csproj --configuration Release --output ${{env.DOTNET_ROOT}}/myapp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_956E4E9D15BE4C40A0FD36FA1992F579 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_14D9436CBB724DD1836BF7D700F3B0E3 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_3690B0E8AD53401F896C0BCED9C67AFC }}

      - name: Deploy to Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: platzicursoweb21
          package: .
